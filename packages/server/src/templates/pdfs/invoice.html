<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        padding: 40px;
        color: #1e293b;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid #2563eb;
        padding-bottom: 20px;
        margin-bottom: 30px;
      }
      .header h1 {
        font-size: 28px;
        color: #0f172a;
      }
      .header .logo {
        font-size: 18px;
        color: #64748b;
      }
      .info {
        margin-bottom: 30px;
      }
      .info p {
        margin-bottom: 8px;
        font-size: 14px;
      }
      .info strong {
        color: #0f172a;
      }
      .amount {
        background-color: #f1f5f9;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
      }
      .amount h2 {
        font-size: 18px;
        color: #475569;
      }
      .amount .value {
        font-size: 28px;
        font-weight: 700;
        color: #2563eb;
      }
      .status {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .status.paid {
        background-color: #dcfce7;
        color: #16a34a;
      }
      .status.partially_paid {
        background-color: #fef3c7;
        color: #d97706;
      }
      .status.draft,
      .status.sent {
        background-color: #e0e7ff;
        color: #4f46e5;
      }
      .footer {
        margin-top: 50px;
        border-top: 1px solid #e2e8f0;
        padding-top: 15px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Facture {{reference}}</h1>
        <div class="logo">NexusFlow</div>
      </div>
      <div style="text-align: right">
        <p>{{date}}</p>
        <span class="status {{status}}">{{status}}</span>
      </div>
    </div>
    <div class="info">
      <p><strong>Client :</strong> {{clientName}}</p>
      <p><strong>Date :</strong> {{date}}</p>
      <p><strong>Échéance :</strong> {{dueDate}}</p>
    </div>
    <div class="amount">
      <div>
        <h2>Total HT</h2>
        <div class="value">{{totalHT}} €</div>
      </div>
      <div>
        <h2>Total TTC</h2>
        <div class="value">{{totalTTC}} €</div>
      </div>
    </div>
    <div class="footer">NexusFlow – 12 rue Marcory, Côte d'Ivoire – 2KGElab@nexusflow.dev</div>
  </body>
</html>
